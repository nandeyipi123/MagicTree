<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Interactive 3D Gallery - Artistic Heart Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; font-family: 'Times New Roman', serif; user-select: none; }
        #canvas-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* UI 排版优化：居左对齐，留出视觉空间 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10; pointer-events: none;
            display: flex; flex-direction: column; 
            align-items: flex-start; /* 核心修改：居左 */
            padding-top: 60px;
            padding-left: 60px;
            box-sizing: border-box;
        }

        #loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-out;
        }
        .loader-text {
            color: #d4af37; font-size: 14px; letter-spacing: 4px; margin-top: 20px;
            text-transform: uppercase; font-weight: 100;
        }
        .spinner {
            width: 40px; height: 40px; border: 1px solid rgba(212, 175, 55, 0.2); 
            border-top: 1px solid #d4af37; border-radius: 50%; 
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 缩小标题字号，更显精致 */
        h1 { 
            color: #fceea7; font-size: 42px; margin: 0; font-weight: 400; 
            letter-spacing: 6px; 
            text-shadow: 0 0 40px rgba(252, 238, 167, 0.4); 
            background: linear-gradient(to bottom, #fff, #eebb66);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Cinzel', 'Times New Roman', serif;
            opacity: 0.95;
        }

        .gesture-hint {
            color: rgba(212, 175, 55, 0.7);
            font-size: 13px;
            margin-top: 20px;
            margin-left: 5px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
            font-family: 'Microsoft YaHei', sans-serif;
            line-height: 1.8;
        }
    </style>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div class="loader-text">Loading Memories</div>
    </div>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <h1>Merry Christmas</h1>
        <div id="hint-text" class="gesture-hint">
            左键点击引爆星云<br>
            按住左键拖动视角<br>
            点击照片定格查看<br>
            右键重聚圣诞之树
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js'; 

        const CONFIG = {
            colors: {
                bg: 0x010203, 
                champagneGold: 0xffd966, 
                deepGreen: 0x054422,     
                accentRed: 0xcc0011,     
            },
            particles: {
                count: 1200,     
                dustCount: 1500, 
                treeHeight: 24,  
                treeRadius: 8    
            },
            camera: { z: 45 } // 相机稍微拉近一点，配合左侧的UI
        };

        const STATE = {
            mode: 'TREE', 
            focusTarget: null,
            rotation: { y: 0 } 
        };

        let scene, camera, renderer, composer, controls;
        let mainGroup; 
        let bgStars; 
        let clock = new THREE.Clock();
        let particleSystem = []; 
        let photoMeshGroup = new THREE.Group();
        let caneTexture; 
        let baseGroup = new THREE.Group(); // 专门存放底座

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let startX = 0, startY = 0;

        async function init() {
            initThree();
            setupEnvironment(); 
            setupLights();
            createTextures();
            createBackgroundStars(); 
            createPedestalBase(); // 新增：创建托底座
            createSideAtmosphere(); // 新增：左右两侧氛围粒子
            createParticles(); 
            createDust();    
            loadMyPhotos(); 
            setupPostProcessing();
            setupEvents();
            
            setTimeout(() => {
                const loader = document.getElementById('loader');
                if (loader) {
                    loader.style.opacity = 0;
                    setTimeout(() => loader.remove(), 800);
                }
            }, 800);

            animate();
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.colors.bg);
            scene.fog = new THREE.FogExp2(CONFIG.colors.bg, 0.008); 

            // 相机稍微往右偏一点，给左侧的字留出绝对中心
            camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 2, CONFIG.camera.z); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ACESFilmicToneMapping; 
            renderer.toneMappingExposure = 1.0; 
            container.appendChild(renderer.domElement);

            mainGroup = new THREE.Group();
            scene.add(mainGroup);
            mainGroup.add(baseGroup);

            // 让整个场景稍微偏右一点，平衡视觉
            mainGroup.position.x = 2;

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.enableZoom = true;
            controls.maxDistance = 150;
            controls.enabled = false; 
            controls.target.set(2, 0, 0); // 焦点也偏右
        }

        function setupEnvironment() {
            const pmremGenerator = new THREE.PMREMGenerator(renderer);
            scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
        }

        function setupLights() {
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const innerLight = new THREE.PointLight(0xffaa00, 3, 25);
            innerLight.position.set(0, 5, 0);
            mainGroup.add(innerLight);

            const spotGold = new THREE.SpotLight(0xffcc66, 800);
            spotGold.position.set(30, 40, 40);
            spotGold.angle = 0.5;
            spotGold.penumbra = 0.5;
            scene.add(spotGold);

            const spotBlue = new THREE.SpotLight(0x6688ff, 400);
            spotBlue.position.set(-30, 20, -30);
            scene.add(spotBlue);
            
            const fill = new THREE.DirectionalLight(0xffeebb, 1.2);
            fill.position.set(0, 0, 50);
            scene.add(fill);
        }

        function setupPostProcessing() {
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
            bloomPass.threshold = 0.8; 
            bloomPass.strength = 0.6;  
            bloomPass.radius = 0.4;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);
        }

        function createTextures() {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0,0,128,128);
            ctx.fillStyle = '#880000'; 
            ctx.beginPath();
            for(let i=-128; i<256; i+=32) {
                ctx.moveTo(i, 0); ctx.lineTo(i+32, 128); ctx.lineTo(i+16, 128); ctx.lineTo(i-16, 0);
            }
            ctx.fill();
            caneTexture = new THREE.CanvasTexture(canvas);
            caneTexture.wrapS = THREE.RepeatWrapping;
            caneTexture.wrapT = THREE.RepeatWrapping;
            caneTexture.repeat.set(3, 3);
        }

        // 新增：高定版水晶底座
        function createPedestalBase() {
            const baseY = -CONFIG.particles.treeHeight / 2 - 1.5;

            // 玻璃透射盘
            const glassGeo = new THREE.CylinderGeometry(9, 11, 0.6, 64);
            const glassMat = new THREE.MeshPhysicalMaterial({
                color: 0x111111, metalness: 0.9, roughness: 0.1, transmission: 0.9, thickness: 1.0, clearcoat: 1.0
            });
            const glassBase = new THREE.Mesh(glassGeo, glassMat);
            glassBase.position.y = baseY;
            baseGroup.add(glassBase);

            // 金色光环
            const ringGeo = new THREE.TorusGeometry(9.2, 0.1, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xffd966 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.y = baseY + 0.3;
            baseGroup.add(ring);

            // 底部虚化光效
            const glowGeo = new THREE.PlaneGeometry(30, 30);
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(212, 175, 55, 0.3)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,128,128);
            const glowTex = new THREE.CanvasTexture(canvas);
            
            const glowMat = new THREE.MeshBasicMaterial({ map: glowTex, transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
            const glowPlane = new THREE.Mesh(glowGeo, glowMat);
            glowPlane.rotation.x = -Math.PI / 2;
            glowPlane.position.y = baseY - 0.5;
            baseGroup.add(glowPlane);
        }

        // 新增：左右两侧的高级氛围粒子阵列
        function createSideAtmosphere() {
            const sideGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const sideMat = new THREE.MeshBasicMaterial({ color: 0xffaacc, transparent: true, opacity: 0.6, blending: THREE.AdditiveBlending });

            for(let i=0; i<400; i++) {
                const mesh = new THREE.Mesh(sideGeo, sideMat);
                // 分布在左侧(-30到-15) 和 右侧(15到30)
                const isLeft = Math.random() > 0.5;
                const x = (isLeft ? -1 : 1) * (18 + Math.random() * 20);
                const y = (Math.random() - 0.5) * 50;
                const z = (Math.random() - 0.5) * 30;
                
                mesh.position.set(x, y, z);
                mesh.scale.setScalar(Math.random() * 0.8 + 0.2);
                mainGroup.add(mesh);

                // 让侧边粒子也加入物理系统，点击时随星云一起飘动
                const p = new Particle(mesh, 'SIDE_DUST', true);
                p.posTree.set(x, y, z); // 树状态下保持在两侧
                p.posScatter.set(x * 1.5, y * 1.5, z * 1.5); // 炸开时稍微扩散
                particleSystem.push(p);
            }
        }

        function createBackgroundStars() {
            const bgGeo = new THREE.BufferGeometry();
            const bgCount = 5000; 
            const bgPos = new Float32Array(bgCount * 3);
            const bgCol = new Float32Array(bgCount * 3);
            
            for(let i=0; i<bgCount; i++) {
                const r = 80 + Math.random() * 700; 
                const theta = Math.random() * 2 * Math.PI;
                const phi = Math.acos(Math.random() * 2 - 1);
                bgPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
                bgPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
                bgPos[i*3+2] = r * Math.cos(phi);
                
                const color = new THREE.Color().setHSL(0.6 + Math.random()*0.1, 0.6, 0.4 + Math.random()*0.4); 
                bgCol[i*3] = color.r; bgCol[i*3+1] = color.g; bgCol[i*3+2] = color.b;
            }
            bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
            bgGeo.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
            
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(8, 8, 0, 8, 8, 8);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0,0,16,16);
            const starTexture = new THREE.CanvasTexture(canvas);

            const bgMat = new THREE.PointsMaterial({
                size: 1.5, transparent: true, opacity: 0.5, vertexColors: true,
                map: starTexture, blending: THREE.AdditiveBlending, depthWrite: false
            });
            bgStars = new THREE.Points(bgGeo, bgMat);
            scene.add(bgStars);
        }

        class Particle {
            constructor(mesh, type, isDust = false) {
                this.mesh = mesh;
                this.type = type;
                this.isDust = isDust;
                
                this.posTree = new THREE.Vector3();
                this.posScatter = new THREE.Vector3();
                this.baseScale = mesh.scale.x; 
                this.blinkPhase = Math.random() * Math.PI * 2; 

                const speedMult = (type === 'PHOTO') ? 0.3 : 1.5;
                this.spinSpeed = new THREE.Vector3(
                    (Math.random() - 0.5) * speedMult,
                    (Math.random() - 0.5) * speedMult,
                    (Math.random() - 0.5) * speedMult
                );

                this.calculatePositions();
            }

            calculatePositions() {
                if(this.type === 'SIDE_DUST') return; // 侧边粒子在外部生成了坐标

                const h = CONFIG.particles.treeHeight;
                const halfH = h / 2;
                let t = Math.random(); 
                t = Math.pow(t, 0.8); 
                const y = (t * h) - halfH;
                let rMax = CONFIG.particles.treeRadius * (1.0 - t); 
                if (rMax < 0.5) rMax = 0.5;
                const angle = t * 50 * Math.PI + Math.random() * Math.PI; 
                const r = rMax * (0.8 + Math.random() * 0.4); 
                this.posTree.set(Math.cos(angle) * r, y, Math.sin(angle) * r);

                let rScatter = this.isDust ? (12 + Math.random()*25) : (8 + Math.random()*15);
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                this.posScatter.set(
                    rScatter * Math.sin(phi) * Math.cos(theta),
                    rScatter * Math.sin(phi) * Math.sin(theta),
                    rScatter * Math.cos(phi)
                );
            }

            update(dt, mode, focusTargetMesh) {
                let target = this.posTree;
                
                if (mode === 'SCATTER') target = this.posScatter;
                else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) {
                        const distance = 16; 
                        const camDir = new THREE.Vector3();
                        camera.getWorldDirection(camDir); 
                        const desiredWorldPos = camera.position.clone().add(camDir.multiplyScalar(distance));
                        const invMatrix = new THREE.Matrix4().copy(mainGroup.matrixWorld).invert();
                        target = desiredWorldPos.applyMatrix4(invMatrix);
                    } else {
                        target = this.posScatter;
                    }
                }

                const lerpSpeed = (mode === 'FOCUS' && this.mesh === focusTargetMesh) ? 5.0 : 2.0; 
                this.mesh.position.lerp(target, lerpSpeed * dt);

                if (mode === 'SCATTER') {
                    this.mesh.rotation.x += this.spinSpeed.x * dt;
                    this.mesh.rotation.y += this.spinSpeed.y * dt;
                    this.mesh.rotation.z += this.spinSpeed.z * dt; 
                } else if (mode === 'TREE') {
                    this.mesh.rotation.x = THREE.MathUtils.lerp(this.mesh.rotation.x, 0, dt);
                    this.mesh.rotation.z = THREE.MathUtils.lerp(this.mesh.rotation.z, 0, dt);
                    this.mesh.rotation.y += 0.5 * dt; 
                }
                
                if (mode === 'FOCUS' && this.mesh === focusTargetMesh) {
                    this.mesh.lookAt(camera.position); 
                }

                let s = this.baseScale;
                if (this.isDust || this.type === 'SIDE_DUST') {
                    s = this.baseScale * (0.8 + 0.4 * Math.sin(clock.elapsedTime * 4 + this.blinkPhase));
                    if (mode === 'TREE' && this.type !== 'SIDE_DUST') s = 0; 
                } else if (mode === 'SCATTER' && this.type === 'PHOTO') {
                    s = this.baseScale * 2.5; 
                } else if (mode === 'FOCUS') {
                    if (this.mesh === focusTargetMesh) s = 4.5; 
                    else s = this.baseScale * 0.8; 
                }
                
                this.mesh.scale.lerp(new THREE.Vector3(s,s,s), 4*dt);
            }
        }

        // 核心修改：生成 3D 爱心替换原本的星星
        function createTopHeart() {
            const x = 0, y = 0;
            const heartShape = new THREE.Shape();
            // 用三次贝塞尔曲线绘制完美爱心
            heartShape.moveTo( x + 5, y + 5 );
            heartShape.bezierCurveTo( x + 5, y + 5, x + 4, y, x, y );
            heartShape.bezierCurveTo( x - 6, y, x - 6, y + 7,x - 6, y + 7 );
            heartShape.bezierCurveTo( x - 6, y + 11, x - 3, y + 15.4, x + 5, y + 19 );
            heartShape.bezierCurveTo( x + 12, y + 15.4, x + 16, y + 11, x + 16, y + 7 );
            heartShape.bezierCurveTo( x + 16, y + 7, x + 16, y, x + 10, y );
            heartShape.bezierCurveTo( x + 7, y, x + 5, y + 5, x + 5, y + 5 );

            const extrudeSettings = { depth: 2, bevelEnabled: true, bevelSegments: 4, steps: 2, bevelSize: 1, bevelThickness: 1 };
            const heartGeo = new THREE.ExtrudeGeometry( heartShape, extrudeSettings );
            heartGeo.center(); // 居中
            
            // 剔透的红宝石材质
            const heartMat = new THREE.MeshPhysicalMaterial({
                color: 0xff1144, emissive: 0x550011, emissiveIntensity: 0.8,
                metalness: 0.2, roughness: 0.05, clearcoat: 1.0, transmission: 0.8, thickness: 2.0
            });

            const heart = new THREE.Mesh(heartGeo, heartMat);
            // 缩小并翻转（Shape绘制的爱心默认是倒过来的）
            heart.scale.set(0.12, 0.12, 0.12);
            heart.rotation.z = Math.PI; 
            heart.position.set(0, CONFIG.particles.treeHeight/2 + 1.8, 0);
            
            // 给爱心加一圈背光
            const glowGeo = new THREE.PlaneGeometry(8, 8);
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(255, 50, 100, 0.8)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,128,128);
            const glowMat = new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(canvas), transparent: true, blending: THREE.AdditiveBlending, depthWrite: false });
            const heartGlow = new THREE.Mesh(glowGeo, glowMat);
            heartGlow.position.z = -0.5;
            heart.add(heartGlow);

            mainGroup.add(heart);
        }

        function createParticles() {
            const sphereGeo = new THREE.SphereGeometry(0.5, 64, 64); 
            const crystalGeo = new THREE.OctahedronGeometry(0.4, 0); 
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, -0.5, 0), new THREE.Vector3(0, 0.3, 0),
                new THREE.Vector3(0.1, 0.5, 0), new THREE.Vector3(0.3, 0.4, 0)
            ]);
            const candyGeo = new THREE.TubeGeometry(curve, 32, 0.08, 16, false); 

            const goldMat = new THREE.MeshPhysicalMaterial({
                color: CONFIG.colors.champagneGold, metalness: 1.0, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.1 
            });
            const greenMat = new THREE.MeshPhysicalMaterial({
                color: CONFIG.colors.deepGreen, metalness: 0.1, roughness: 0.2, transmission: 0.8, thickness: 0.5 
            });
            const redMat = new THREE.MeshPhysicalMaterial({
                color: CONFIG.colors.accentRed, metalness: 0.2, roughness: 0.1, clearcoat: 1.0, clearcoatRoughness: 0.0 
            });
            const candyMat = new THREE.MeshStandardMaterial({ map: caneTexture, roughness: 0.3, metalness: 0.1 });

            for (let i = 0; i < CONFIG.particles.count; i++) {
                const rand = Math.random();
                let mesh, type;
                
                if (rand < 0.35) { mesh = new THREE.Mesh(crystalGeo, greenMat); type = 'GREEN_CRYSTAL'; } 
                else if (rand < 0.65) { mesh = new THREE.Mesh(sphereGeo, goldMat); type = 'GOLD_BALL'; } 
                else if (rand < 0.90) { mesh = new THREE.Mesh(sphereGeo, redMat); type = 'RED_BALL'; } 
                else { mesh = new THREE.Mesh(candyGeo, candyMat); type = 'CANE'; }

                const s = 0.5 + Math.random() * 0.5; 
                mesh.scale.set(s,s,s);
                mesh.rotation.set(Math.random()*6, Math.random()*6, Math.random()*6);
                
                mainGroup.add(mesh);
                particleSystem.push(new Particle(mesh, type, false));
            }

            // 替换原本的星星为红宝石爱心
            createTopHeart();
            
            mainGroup.add(photoMeshGroup);
        }

        function createDust() {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255, 238, 187, 1)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,16,16);
            const dustTexture = new THREE.CanvasTexture(canvas);

            const dustGeo = new THREE.BufferGeometry();
            const dustPos = new Float32Array(CONFIG.particles.dustCount * 3);
            for(let i=0; i<CONFIG.particles.dustCount; i++) {
                dustPos[i*3] = 0; dustPos[i*3+1] = 0; dustPos[i*3+2] = 0;
            }
            dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
            
            const dustMat = new THREE.PointsMaterial({
                size: 0.6, map: dustTexture, 
                transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false
            });
            const dustSystem = new THREE.Points(dustGeo, dustMat);
            mainGroup.add(dustSystem);

            for(let i=0; i<CONFIG.particles.dustCount; i++) {
                 const dummyMesh = new THREE.Mesh();
                 particleSystem.push(new Particle(dummyMesh, 'DUST', true));
            }
            window.dustPointsMesh = dustSystem;
        }

        function loadMyPhotos() {
            const myPhotos = [
                './photos/1.jpg',
                './photos/2.jpg',
                './photos/3.jpg',
                './photos/4.jpg',
                './photos/5.jpg'
            ];
            
            const totalFrames = 45;
            const loader = new THREE.TextureLoader();

            for (let i = 0; i < totalFrames; i++) {
                const photoUrl = myPhotos[i % myPhotos.length]; 
                
                loader.load(
                    photoUrl, 
                    (texture) => {
                        texture.colorSpace = THREE.SRGBColorSpace;
                        texture.anisotropy = renderer.capabilities.getMaxAnisotropy(); 
                        texture.minFilter = THREE.LinearMipmapLinearFilter;
                        addPhotoToScene(texture);
                    },
                    undefined,
                    (err) => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 1024; canvas.height = 1024; 
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = '#050505'; ctx.fillRect(0,0,1024,1024);
                        ctx.strokeStyle = '#eebb66'; ctx.lineWidth = 30; ctx.strokeRect(40,40,944,944);
                        ctx.font = '500 100px Times New Roman'; ctx.fillStyle = '#eebb66';
                        ctx.textAlign = 'center'; 
                        ctx.fillText("Wanming's", 512, 450);
                        ctx.fillText("Memory", 512, 600);
                        const tex = new THREE.CanvasTexture(canvas);
                        tex.colorSpace = THREE.SRGBColorSpace;
                        tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
                        addPhotoToScene(tex);
                    }
                );
            }
        }

        function addPhotoToScene(texture) {
            const frameGeo = new THREE.BoxGeometry(1.4, 1.4, 0.05);
            const frameMat = new THREE.MeshPhysicalMaterial({ 
                color: CONFIG.colors.champagneGold, metalness: 1.0, roughness: 0.1, clearcoat: 1.0
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);

            const photoGeo = new THREE.PlaneGeometry(1.2, 1.2);
            const photoMat = new THREE.MeshBasicMaterial({ map: texture, toneMapped: false });
            const photo = new THREE.Mesh(photoGeo, photoMat);
            photo.position.z = 0.026;

            const group = new THREE.Group();
            group.add(frame);
            group.add(photo);
            
            const s = 0.8;
            group.scale.set(s,s,s);
            
            photoMeshGroup.add(group);
            particleSystem.push(new Particle(group, 'PHOTO', false));
        }

        function setupEvents() {
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                composer.setSize(window.innerWidth, window.innerHeight);
            });

            window.addEventListener('pointerdown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
            });

            window.addEventListener('pointerup', (e) => {
                const moveDistance = Math.abs(e.clientX - startX) + Math.abs(e.clientY - startY);
                if (moveDistance > 5) return; 

                if (e.button === 0) { 
                    if (STATE.mode === 'TREE') {
                        STATE.mode = 'SCATTER';
                        STATE.focusTarget = null;
                        controls.enabled = true; 
                        // 隐藏底座
                        baseGroup.visible = false;
                        document.getElementById('hint-text').innerHTML = "按住左键拖动视角<br>点击照片定格查看<br>右键重聚圣诞之树";
                    } 
                    else if (STATE.mode === 'SCATTER') {
                        mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                        raycaster.setFromCamera(mouse, camera);

                        const intersects = raycaster.intersectObjects(photoMeshGroup.children, true);
                        if (intersects.length > 0) {
                            STATE.mode = 'FOCUS';
                            STATE.focusTarget = intersects[0].object.parent; 
                            controls.enabled = false; 
                            document.getElementById('hint-text').innerHTML = "静静回望这份回忆<br>右键退回浩瀚星云";
                        }
                    }
                } 
                else if (e.button === 2) { 
                    if (STATE.mode === 'FOCUS') {
                        STATE.mode = 'SCATTER';
                        STATE.focusTarget = null;
                        controls.enabled = true; 
                        document.getElementById('hint-text').innerHTML = "按住左键拖动视角<br>点击照片定格查看<br>右键重聚圣诞之树";
                    } 
                    else if (STATE.mode === 'SCATTER') {
                        STATE.mode = 'TREE';
                        STATE.focusTarget = null;
                        controls.enabled = false; 
                        baseGroup.visible = true; // 恢复底座
                        
                        camera.position.set(0, 2, CONFIG.camera.z);
                        controls.target.set(2, 0, 0);
                        document.getElementById('hint-text').innerHTML = "左键点击引爆星云<br>按住左键拖动视角<br>点击照片定格查看<br>右键重聚圣诞之树";
                    }
                }
            });

            window.addEventListener('contextmenu', (e) => e.preventDefault());
        }

        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            
            controls.update();

            if (bgStars) {
                bgStars.rotation.y -= 0.0005;
                bgStars.rotation.x += 0.0002;
            }

            if (STATE.mode === 'TREE') {
                STATE.rotation.y += 0.3 * dt;
            } else if (STATE.mode === 'SCATTER') {
                STATE.rotation.y += 0.1 * dt; 
            }

            mainGroup.rotation.y = STATE.rotation.y;

            let dustIndex = 0;
            const dustPositions = window.dustPointsMesh ? window.dustPointsMesh.geometry.attributes.position.array : null;

            particleSystem.forEach(p => {
                p.update(dt, STATE.mode, STATE.focusTarget);
                if (p.isDust && dustPositions) {
                    dustPositions[dustIndex*3] = p.mesh.position.x;
                    dustPositions[dustIndex*3+1] = p.mesh.position.y;
                    dustPositions[dustIndex*3+2] = p.mesh.position.z;
                    dustIndex++;
                }
            });

            if (window.dustPointsMesh) {
                window.dustPointsMesh.geometry.attributes.position.needsUpdate = true;
            }

            composer.render();
        }

        init();
    </script>
</body>
</html>
